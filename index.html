<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Credizona Reset</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#050914;--panel:#0b1630;--surface:#071225;--green:#5cff70;--green2:#35d85e;--text:#f7fbff;--muted:#a9b4cc;--subtle:#7a8aaa;--danger:#ff7538;--warn:#ffd447;--blue:#4B8EF0;--border:rgba(255,255,255,.10);--shadow:0 30px 80px rgba(0,0,0,.45)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at 12% 8%,rgba(92,255,112,.15),transparent 25%),radial-gradient(circle at 70% 8%,rgba(85,46,180,.28),transparent 25%),linear-gradient(180deg,#050914 0%,#071225 52%,#050914 100%);color:var(--text)}
button,input{font-family:inherit}button{cursor:pointer}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.fade{animation:fadeUp .28s ease both}
.header{position:sticky;top:0;z-index:50;background:rgba(5,9,20,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.07)}
.header-inner{max-width:980px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px;font-weight:900}.brand span{color:var(--green)}
.brand-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--blue));color:#041008;display:grid;place-items:center;font-weight:900}
.header-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:800}
.main{max-width:760px;margin:0 auto;padding:28px 18px 120px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:16px}
.card-strong{background:linear-gradient(180deg,rgba(11,22,48,.96),rgba(8,18,40,.98));border:1px solid rgba(255,255,255,.08);border-radius:18px;box-shadow:var(--shadow)}
.kicker{display:inline-flex;align-items:center;gap:9px;border:1px solid rgba(92,255,112,.28);color:var(--green);background:rgba(92,255,112,.08);border-radius:999px;padding:8px 14px;font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.hero{padding:34px 26px 28px;position:relative;overflow:hidden;border:2px solid rgba(92,255,112,.32)}
.hero:before{content:"";position:absolute;top:-80px;left:-80px;width:260px;height:260px;border-radius:50%;background:rgba(92,255,112,.08)}
.hero:after{content:"";position:absolute;top:-50px;right:-40px;width:210px;height:210px;border-radius:50%;background:rgba(75,142,240,.12)}
.hero>*{position:relative;z-index:1}
h1{margin:18px 0 14px;font-size:clamp(28px,5vw,44px);line-height:.98;letter-spacing:-.06em;text-transform:uppercase;font-weight:900}
h1 span{color:var(--green)}
.lead{font-size:16px;line-height:1.65;color:#d5dbea;max-width:600px;margin-bottom:20px}
.badges{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
.badge{display:inline-flex;align-items:center;gap:7px;padding:8px 12px;border-radius:12px;font-size:12px;font-weight:900;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);color:#dbe5f5}
.badge.green{color:var(--green);background:rgba(92,255,112,.10);border-color:rgba(92,255,112,.32)}
.pain-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.pain{display:flex;gap:10px;align-items:flex-start;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.075);border-radius:12px;padding:12px 14px}
.pain div{font-size:12px;color:var(--muted);font-weight:700;line-height:1.4}
.pre-card{padding:20px;margin-top:18px}.pre-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pre-item{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px}
.lbl{font-size:10px;color:var(--subtle);text-transform:uppercase;letter-spacing:.06em;font-weight:800;margin-bottom:5px}
.val{font-size:14px;color:#dbe5f5;font-weight:700}
.score-panel{margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.score-box{padding:18px;text-align:center}.score-big{font-size:54px;line-height:1;font-weight:900;font-family:Georgia,serif}
.status{display:inline-block;margin-top:8px;border-radius:999px;padding:5px 14px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.06em}
.status.green{color:var(--green);border:1px solid rgba(92,255,112,.35);background:rgba(92,255,112,.10)}
.status.yellow{color:var(--warn);border:1px solid rgba(255,212,71,.35);background:rgba(255,212,71,.10)}
.status.red{color:var(--danger);border:1px solid rgba(255,117,56,.35);background:rgba(255,117,56,.10)}
.precision{height:8px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin-top:10px}.precision div{height:100%;border-radius:999px;background:var(--green)}
.tabs{display:flex;gap:6px;overflow-x:auto;margin:22px 0;padding-bottom:4px}
.tab{flex-shrink:0;background:transparent;color:var(--muted);border:1.5px solid var(--border);padding:9px 13px;border-radius:9px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.02em}
.tab.active{border-color:var(--green);background:rgba(92,255,112,.08);color:var(--green)}
.section-title{font-size:20px;font-weight:900;letter-spacing:-.03em;margin-bottom:8px}.text{font-size:13px;color:var(--muted);line-height:1.68}
.info{padding:15px 16px;border-radius:13px;margin-top:12px;border:1px solid var(--border);background:rgba(255,255,255,.04)}
.info.good{border-color:rgba(92,255,112,.25);background:rgba(92,255,112,.07)}.info.warn{border-color:rgba(255,212,71,.25);background:rgba(255,212,71,.07)}
.plan-hero{padding:20px;border:2px solid rgba(92,255,112,.36);background:linear-gradient(180deg,rgba(11,22,48,.96),rgba(8,18,40,.98))}
.plan-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}.plan-icon{font-size:30px}.plan-name{font-size:20px;font-weight:900}.plan-label{font-size:10px;color:var(--green);text-transform:uppercase;letter-spacing:.08em;font-weight:900}
.step{display:flex;gap:12px;padding:14px 16px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-left:3px solid var(--green);margin-top:10px}
.step-num{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;background:rgba(92,255,112,.12);border:1.5px solid rgba(92,255,112,.4);color:var(--green);font-weight:900;font-size:12px}
.step b{font-size:14px}.step p{font-size:12px;color:var(--muted);line-height:1.55;margin-top:4px}
.debt-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:15px;border:1px solid var(--border);border-radius:13px;margin-bottom:10px;background:rgba(255,255,255,.035)}
.debt-name{font-size:15px;font-weight:900}.debt-meta{font-size:12px;color:var(--muted);margin-top:3px}
.money{position:relative}.money span{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--green);font-weight:900}
.money input{width:140px;background:var(--surface);border:1.5px solid var(--border);color:var(--text);border-radius:10px;padding:10px 10px 10px 26px;outline:none}
.btn{border:0;border-radius:12px;padding:12px 18px;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.02em}
.btn-primary{background:linear-gradient(90deg,var(--green),var(--green2));color:#041008;box-shadow:0 8px 26px rgba(92,255,112,.26)}
.btn-soft{background:rgba(92,255,112,.10);border:1px solid rgba(92,255,112,.3);color:var(--green)}
.btn-warn{background:linear-gradient(90deg,var(--warn),#f59e0b);color:#1a1000}
.range{width:100%;accent-color:var(--green);margin-top:10px}
.offer{border:2px dashed rgba(255,212,71,.35);background:rgba(255,212,71,.06);padding:20px;border-radius:16px}.offer-price{font-size:34px;color:var(--warn);font-weight:900;font-family:Georgia,serif}
.sticky{position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(5,9,20,.94);backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.08);padding:12px 18px}
.sticky-inner{max-width:760px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:14px}.sticky small{display:block;color:var(--muted);font-size:11px}.sticky b{font-size:13px}
.input-card{padding:18px;margin-top:16px}.form-row{margin-bottom:14px}.inp{width:100%;background:var(--surface);border:1.5px solid var(--border);color:var(--text);border-radius:10px;padding:11px 13px;outline:none}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:620px){.main{padding-left:14px;padding-right:14px}.pain-grid,.pre-grid,.score-panel,.form-grid{grid-template-columns:1fr}.debt-row{grid-template-columns:1fr}.money input{width:100%}.sticky-inner{align-items:flex-start}}
</style>
</head>
<body>
<header class="header"><div class="header-inner"><div class="brand"><div class="brand-mark">R</div><div>Credizona <span>Reset</span></div></div><div class="header-label">Diagnóstico inicial gratis</div></div></header>
<main class="main"><div id="app"></div></main>
<div class="sticky"><div class="sticky-inner"><div><small id="sticky-small">Siguiente paso</small><b id="sticky-text">Ver qué me está frenando</b></div><button class="btn btn-primary" id="sticky-btn">Empezar</button></div></div>
<script>
const params=new URLSearchParams(location.search);const hasSurvey=params.get("encuesta")==="si";
const PRE={nombre:params.get("nombre")||"Martín Rodríguez",cedula:params.get("cedula")||"3.456.789-0",email:params.get("email")||"martin@email.com",telefono:params.get("telefono")||"",ingreso:Number(params.get("ingreso")||65000),laboral:params.get("laboral")||"Relación de dependencia",monto:Number(params.get("monto")||70000),rechazo:params.get("motivo_rechazo")||"Score insuficiente",encuestaScore:hasSurvey?72:null};
let step="intro",activeTab="plan",precision=hasSurvey?70:40,extra=3000;
let gastos={alquiler:18000,servicios:6500,alimentacion:19000,transporte:5500,salud:3000,otros:4000};
let deudas=hasSurvey?[{id:1,nombre:"Tarjeta Santander",tipo:"Tarjeta",saldo:42000,inicial:42000,minimo:5000,tasa:8.1,estado:"mora"},{id:2,nombre:"Préstamo personal",tipo:"Préstamo",saldo:120000,inicial:120000,minimo:10500,tasa:4.2,estado:"atraso"},{id:3,nombre:"Tarjeta OCA",tipo:"Tarjeta",saldo:78000,inicial:78000,minimo:8500,tasa:7.5,estado:"al_dia"}]:[{id:1,nombre:"Deuda estimada",tipo:"Estimación",saldo:PRE.monto||70000,inicial:PRE.monto||70000,minimo:Math.round((PRE.monto||70000)*.08),tasa:0,estado:"estimada"}];
function fmt(n){return "$"+Number(n||0).toLocaleString("es-UY",{maximumFractionDigits:0})}
function calc(){const gastoTotal=Object.values(gastos).reduce((a,b)=>a+Number(b||0),0);const deudaTotal=deudas.reduce((a,d)=>a+Number(d.saldo||0),0);const deudaInicial=deudas.reduce((a,d)=>a+Number(d.inicial||0),0);const minimos=deudas.reduce((a,d)=>a+(Number(d.saldo)>0?Number(d.minimo||0):0),0);const flujo=PRE.ingreso-gastoTotal-minimos;const ratio=PRE.ingreso?minimos/PRE.ingreso:0;const mora=deudas.filter(d=>d.estado==="mora"&&Number(d.saldo)>0);const atraso=deudas.filter(d=>d.estado==="atraso"&&Number(d.saldo)>0);let indice=hasSurvey?PRE.encuestaScore:38;if(flujo<0)indice+=15;if(ratio>.35)indice+=10;if(mora.length)indice+=15;indice=Math.min(100,indice);let nivel=indice>=75?"Crítico":indice>=50?"En riesgo":indice>=25?"Preliminar":"Controlable";let color=indice>=75?"red":indice>=50?"yellow":"green";let hex=indice>=75?"#ff7538":indice>=50?"#ffd447":"#5cff70";let prioridad=mora[0]||atraso[0]||deudas.filter(d=>Number(d.saldo)>0).sort((a,b)=>(b.tasa||0)-(a.tasa||0))[0];let planId=1,planName="Orden Financiero",planIcon="🗂️";let problema=hasSurvey?"Ya usamos tu encuesta para detectar señales de sobrecarga financiera.":"Con tu solicitud ya podemos darte una primera lectura, pero falta información para afinar el plan.";if(flujo<0){planId=4;planName="Estabilización";planIcon="🚨";problema="Tu mes no cierra: después de gastos y cuotas, quedás en negativo."}else if(mora.length||ratio>.35){planId=2;planName="Reducción de Deuda";planIcon="📉";problema="Demasiado ingreso se va en deudas. Antes de pedir otro préstamo hay que frenar el daño."}else if(indice>=65){planId=3;planName="Recuperación Rápida";planIcon="🚀";problema="Tu situación puede mejorar rápido si corregís algunos puntos concretos."}const progreso=deudaInicial?Math.round(((deudaInicial-deudaTotal)/deudaInicial)*100):0;return{gastoTotal,deudaTotal,deudaInicial,minimos,flujo,ratio,mora,atraso,indice,nivel,color,hex,prioridad,planId,planName,planIcon,problema,progreso}}
function showIntro(){const d=calc();document.getElementById("app").innerHTML=`<div class="fade"><section class="card-strong hero"><div class="kicker"><span class="dot"></span> Diagnóstico inicial gratis</div><h1>Te rechazaron el préstamo.<br><span>Ahora entendé qué hacer.</span></h1><p class="lead">Antes de pedir otro préstamo, frená el daño. Usamos los datos de tu solicitud ${hasSurvey?"y tus respuestas de la encuesta":""} para darte una primera lectura clara.</p><div class="badges"><div class="badge green">✓ Índice Reset preliminar</div><div class="badge">✓ Plan asignado</div><div class="badge">✓ Primera acción concreta</div></div><div class="pain-grid"><div class="pain"><span>😞</span><div>Pagás, pero sentís que no salís nunca</div></div><div class="pain"><span>✕</span><div>Te rechazan y nadie te explica bien por qué</div></div><div class="pain"><span>🔍</span><div>No sabés qué ve el banco sobre vos</div></div><div class="pain"><span>📋</span><div>No tenés un plan claro para ordenar deudas</div></div></div></section><section class="card pre-card"><div class="lbl">Datos que ya tenemos</div><div class="pre-grid">${preItem("Nombre",PRE.nombre)}${preItem("Cédula",PRE.cedula)}${preItem("Ingreso declarado",fmt(PRE.ingreso))}${preItem("Monto solicitado",fmt(PRE.monto))}${preItem("Situación laboral",PRE.laboral)}${preItem("Motivo rechazo",PRE.rechazo)}</div></section><section class="score-panel"><div class="card score-box"><div class="lbl">Índice Reset</div><div class="score-big" style="color:${d.hex}">${d.indice}</div><div class="status ${d.color}">${d.nivel}</div><p class="text" style="margin-top:10px">No es un score crediticio oficial.</p></div><div class="card score-box"><div class="lbl">Precisión actual</div><div class="score-big" style="color:var(--green)">${precision}%</div><div class="precision"><div style="width:${precision}%"></div></div><p class="text" style="margin-top:12px">${hasSurvey?"La encuesta ya mejoró este diagnóstico.":"Respondé 3 datos rápidos para mejorar precisión."}</p></div></section><section class="card info ${hasSurvey?"good":"warn"}"><b>${hasSurvey?"Ya analizamos tu encuesta.":"Diagnóstico preliminar incompleto."}</b><p class="text" style="margin-top:6px">${hasSurvey?"Podemos mostrarte un plan inicial con mayor precisión.":"Podemos ayudarte igual, pero para un plan serio hay que confirmar gastos y deudas."}</p></section></div>`;setSticky("Siguiente paso","Ver qué me está frenando",()=>{step="plan";render()})}
function preItem(l,v){return `<div class="pre-item"><div class="lbl">${l}</div><div class="val">${v}</div></div>`}
function showPlan(){document.getElementById("app").innerHTML=`<div class="fade"><div class="tabs">${tab("plan","Mi plan")}${tab("deudas","Mis deudas")}${tab("asistente","Asistente")}${tab("informe","Informe crediticio")}${tab("detalles","Detalles")}</div><div id="tabContent"></div></div>`;renderTab();setSticky("Siguiente paso",activeTab==="informe"?"Comprar Reset Plus":"Mejorar precisión",()=>{if(activeTab==="informe")alert("Acá conectás MercadoPago / pago real.");else{activeTab="detalles";render()}})}
function tab(id,label){return `<button class="tab ${activeTab===id?"active":""}" onclick="activeTab='${id}';render()">${label}</button>`}
function renderTab(){const d=calc();const el=document.getElementById("tabContent");if(!el)return;if(activeTab==="plan")el.innerHTML=renderPlan(d);if(activeTab==="deudas")el.innerHTML=renderDeudas(d);if(activeTab==="asistente")el.innerHTML=renderAsistente(d);if(activeTab==="informe")el.innerHTML=renderInforme(d);if(activeTab==="detalles")el.innerHTML=renderDetalles(d)}
function renderPlan(d){const steps=[d.flujo<0?"Cerrar el agujero mensual: bajar gastos o renegociar cuotas antes de pagar extra.":"Mantener todos los mínimos al día durante 30 días.",`Atacar primero: ${d.prioridad?.nombre||"la deuda foco"}.`,"No usar tarjetas ni sacar nuevas cuotas durante 30 días.","No repartir pagos extra entre todas las deudas.","Registrar gastos semanalmente para no volver al mismo patrón."];return `<div class="fade"><section class="card plan-hero"><div class="plan-top"><div class="plan-icon">${d.planIcon}</div><div><div class="plan-label">Plan Reset #${d.planId}</div><div class="plan-name">${d.planName}</div></div><div style="margin-left:auto;text-align:right"><div class="lbl">Índice</div><div style="font-size:30px;font-weight:900;color:${d.hex};font-family:Georgia,serif">${d.indice}</div></div></div><div class="info"><div class="lbl">Qué detectamos</div><p class="text">${d.problema}</p></div><div class="info good"><div class="lbl">Primera acción</div><p class="text"><b style="color:var(--green)">${steps[0]}</b></p></div></section><section style="margin-top:14px"><div class="lbl">Plan de 30 días</div>${steps.map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div><div><b>${s}</b>${i===1?`<p>Esta deuda ordena el resto del sistema. No ataques todo junto.</p>`:""}</div></div>`).join("")}</section><section class="card info warn" style="margin-top:14px"><b>Qué NO hacer este mes</b><p class="text" style="margin-top:6px">No pidas otro préstamo para tapar el problema sin entender primero qué está generando el rechazo.</p></section></div>`}
function renderDeudas(d){return `<div class="fade"><p class="text" style="margin-bottom:14px">Actualizá saldos. El diagnóstico se recalcula solo.</p><div class="score-panel"><div class="card score-box"><div class="lbl">Deuda total</div><div class="score-big" style="font-size:32px;color:var(--danger)">${fmt(d.deudaTotal)}</div></div><div class="card score-box"><div class="lbl">Flujo estimado</div><div class="score-big" style="font-size:32px;color:${d.flujo<0?"var(--danger)":"var(--green)"}">${fmt(d.flujo)}</div></div></div><div style="margin-top:14px">${deudas.map(x=>`<div class="debt-row"><div><div class="debt-name">${x.nombre}</div><div class="debt-meta">Mínimo: ${fmt(x.minimo)} · Estado: ${x.estado} · Tasa: ${x.tasa}%</div></div>${Number(x.saldo)>0?`<div style="display:flex;gap:8px;align-items:center"><div class="money"><span>$</span><input type="number" value="${x.saldo}" onchange="updateSaldo(${x.id},this.value)"></div><button class="btn btn-soft" onclick="cancelar(${x.id})">Cancelar</button></div>`:`<div class="status green">Cancelada</div>`}</div>`).join("")}</div></div>`}
function renderAsistente(d){const meses=d.prioridad?Math.ceil(Number(d.prioridad.saldo||0)/Math.max(1,Number(d.prioridad.minimo||0)+extra)):0;return `<div class="fade"><section class="card info good"><b>Lectura humana</b><p class="text" style="margin-top:8px">Tu situación no se arregla agregando otra deuda. Primero hay que frenar el daño, ordenar prioridades y recuperar flujo.</p></section><section class="card info"><b>Si pagás extra</b><p class="text" style="margin-top:8px">Si podés pagar <b style="color:var(--green)">${fmt(extra)}</b> extra por mes, liquidarías <b>${d.prioridad?.nombre||"tu deuda foco"}</b> en aproximadamente <b>${meses} meses</b>.</p><input class="range" type="range" min="0" max="30000" step="1000" value="${extra}" oninput="extra=Number(this.value);render()"></section><section class="card info warn"><b>IA real</b><p class="text" style="margin-top:8px">En producción, esta sección debe llamar a un backend. Nunca pongas API keys en el frontend.</p></section></div>`}
function renderInforme(d){return `<div class="fade"><section class="offer"><div class="lbl" style="color:var(--warn)">Reset Plus</div><h2 style="font-size:28px;line-height:1.1;margin:8px 0 10px">¿Querés saber exactamente qué ve el banco sobre vos?</h2><p class="text">Pedí tu informe crediticio, interpretación simple y un plan de 30 días para corregir lo que más te está frenando.</p><div style="display:flex;justify-content:space-between;align-items:end;gap:14px;margin:18px 0"><div><div class="offer-price">UYU 990</div><div class="text">Pago único · Sin suscripción</div></div><button class="btn btn-warn" onclick="alert('Acá conectás MercadoPago.')">Comprar Reset Plus</button></div><div class="info">${["Informe Clearing / bureau equivalente","Interpretación simple del informe","Deuda foco y prioridad","Plan de 30 días","Seguimiento por WhatsApp"].map(x=>`<p class="text">✓ ${x}</p>`).join("")}</div></section></div>`}
function renderDetalles(d){return `<div class="fade"><section class="card input-card"><div class="section-title">Mejorar precisión</div><p class="text">Confirmá gastos y deudas para subir el diagnóstico hacia 95%.</p><div class="form-grid" style="margin-top:14px">${Object.keys(gastos).map(k=>`<div class="form-row"><div class="lbl">${k}</div><input class="inp" type="number" value="${gastos[k]}" onchange="gastos['${k}']=Number(this.value||0);precision=95;render()"></div>`).join("")}</div></section><section class="card info" style="margin-top:14px"><div class="section-title">Datos técnicos</div><p class="text">Ratio deuda/ingreso: ${Math.round(d.ratio*100)}%</p><p class="text">Pagos mínimos: ${fmt(d.minimos)}</p><p class="text">Gastos totales: ${fmt(d.gastoTotal)}</p><p class="text">Deuda inicial: ${fmt(d.deudaInicial)}</p><p class="text">Deuda actual: ${fmt(d.deudaTotal)}</p></section></div>`}
function updateSaldo(id,val){deudas=deudas.map(x=>x.id===id?{...x,saldo:Number(val||0)}:x);render()}
function cancelar(id){deudas=deudas.map(x=>x.id===id?{...x,saldo:0,estado:"al_dia"}:x);render()}
function setSticky(small,text,fn){document.getElementById("sticky-small").textContent=small;document.getElementById("sticky-text").textContent=text;document.getElementById("sticky-btn").onclick=fn}
function render(){if(step==="intro")showIntro();else showPlan()}
render();
</script>
</body>
</html>
