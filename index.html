<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta name="theme-color" content="#10B981"/>
<title>Mi Plan - Credizona</title>
<meta name="description" content="Diagnostico financiero gratuito. Te ayudamos a ordenar tus finanzas y mejorar tu situacion crediticia."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<!-- MODAL NUEVO -->
<div class="modal-overlay hidden" id="modal-nuevo">
  <div class="modal-box" style="max-width:440px;">
    <div style="text-align:center;font-size:32px;margin-bottom:12px;">&#8634;</div>
    <div style="font-size:22px;font-weight:800;text-align:center;margin-bottom:8px;color:var(--color-text);">Empezar de nuevo?</div>
    <p style="font-size:16px;color:var(--color-text-secondary);text-align:center;line-height:1.5;margin-bottom:20px;">Se va a borrar tu diagnostico actual. Esta accion no se puede deshacer.</p>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-secondary" id="btn-cancelar-nuevo" onclick="cerrarModal('modal-nuevo')" style="flex:1;">Cancelar</button>
      <button class="btn" id="btn-confirmar-nuevo" onclick="resetear()" style="flex:1;background:rgba(239,68,68,0.1);border:2px solid rgba(239,68,68,0.3);color:var(--color-error);">Si, borrar</button>
    </div>
  </div>
</div>

<!-- MODAL PREMIUM -->
<div class="modal-overlay hidden" id="modal-premium">
  <div class="modal-box" id="modal-premium-content"></div>
</div>

<!-- MODAL BADGE -->
<div class="modal-overlay hidden" id="modal-badge">
  <div class="modal-box" style="max-width:360px;text-align:center;">
    <div id="badge-celebration-icon" style="font-size:64px;margin-bottom:12px;"></div>
    <div id="badge-celebration-title" style="font-size:22px;font-weight:800;color:var(--color-text);margin-bottom:8px;"></div>
    <div id="badge-celebration-text" style="font-size:16px;color:var(--color-text-secondary);margin-bottom:20px;"></div>
    <button class="btn btn-primary" onclick="cerrarModal('modal-badge')">Continuar</button>
  </div>
</div>

<!-- MAIN -->
<div class="container" id="app">
  <div class="header">
    <div class="logo">
      <img src="https://www.credizona.com.uy/imagenes/LogoHeader.svg" alt="Credizona" onerror="this.parentElement.innerHTML='C'"/>
    </div>
    <div class="brand">Mi <span>Plan</span></div>
    <div class="header-badges" id="header-badges">
      <!-- Badges se renderizan dinamicamente -->
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
      <span id="header-day" class="hidden" style="font-size:13px;font-weight:700;color:var(--color-primary);"></span>
      <button id="btn-nuevo" onclick="confirmarNuevo()" class="hidden nav-back" style="margin-bottom:0;padding:6px 12px;">&#8634; Nuevo</button>
    </div>
  </div>
  
  <!-- Progress Section -->
  <div class="progress-section" id="progress-section" style="display:none;">
    <div class="progress-header">
      <span class="progress-label">Tu progreso</span>
      <span class="progress-percent" id="progress-percent">0%</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-message" id="progress-message">Comienza tu diagnostico</div>
  </div>
  
  <div id="main-content"></div>
</div>

<!-- STICKY -->
<div class="sticky-bar" id="sticky-bar">
  <div class="sticky-inner">
    <div>
      <div class="sticky-lbl" id="sticky-lbl">Mi Plan</div>
      <div class="sticky-step" id="sticky-step">Diagnostico gratuito</div>
    </div>
    <button class="sticky-btn" id="sticky-cta" onclick="next()">Continuar</button>
  </div>
</div>

<script src="js/badges.js"></script>
<script src="js/referrals.js"></script>
<script src="js/upsell.js"></script>
<script src="js/whatsapp-queue.js"></script>
<script src="js/app.js"></script>

</body>
</html>
