<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>Credizona Mi Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<!-- MODAL NUEVO -->
<div class="modal-overlay hidden" id="modal-nuevo">
  <div class="modal-box" style="max-width:500px;">
    <div style="text-align:center;font-size:36px;margin-bottom:16px;">&#8634;</div>
    <div style="font-size:28px;font-weight:900;text-align:center;margin-bottom:10px;">Empezar de nuevo?</div>
    <p style="font-size:18px;color:#8390b5;text-align:center;line-height:1.6;margin-bottom:24px;">Se va a borrar tu diagnostico actual. Esta accion no se puede deshacer.</p>
    <div style="display:flex;gap:12px;">
      <button class="btn btn-secondary" id="btn-cancelar-nuevo" onclick="cerrarModal('modal-nuevo')" style="flex:1;height:64px;font-size:20px;">Cancelar</button>
      <button class="btn" id="btn-confirmar-nuevo" onclick="resetear()" style="flex:1;height:64px;font-size:20px;background:rgba(255,78,114,.2);border:1px solid rgba(255,78,114,.3);color:#ff4e72;">Si, borrar</button>
    </div>
  </div>
</div>

<!-- MODAL PREMIUM -->
<div class="modal-overlay hidden" id="modal-premium">
  <div class="modal-box" id="modal-premium-content"></div>
</div>

<!-- MODAL BADGE -->
<div class="modal-overlay hidden" id="modal-badge">
  <div class="modal-box" style="max-width:400px;text-align:center;">
    <div id="badge-celebration-icon" style="font-size:64px;margin-bottom:16px;"></div>
    <div id="badge-celebration-title" style="font-size:28px;font-weight:900;margin-bottom:10px;"></div>
    <div id="badge-celebration-text" style="font-size:18px;color:#8390b5;margin-bottom:24px;"></div>
    <button class="btn btn-primary" onclick="cerrarModal('modal-badge')" style="height:64px;font-size:20px;">Continuar</button>
  </div>
</div>

<!-- MAIN -->
<div class="container" id="app">
  <div class="header">
    <div class="header-row">
      <div class="logo">
        <img src="https://www.credizona.com.uy/imagenes/LogoHeader.svg" alt="R" onerror="this.parentElement.innerHTML='R'"/>
      </div>
      <div class="brand">Credizona <span>Mi Plan</span></div>
      <div class="header-actions">
        <span id="header-day" class="hidden" style="font-size:13px;font-weight:700;color:#40d7ff;"></span>
        <button id="btn-nuevo" onclick="confirmarNuevo()" class="hidden nav-back" style="margin-bottom:0;padding:6px 10px;font-size:12px;">Nuevo</button>
      </div>
    </div>
    <div class="header-badges" id="header-badges">
      <!-- Badges se renderizan dinamicamente -->
    </div>
  </div>
  
  <!-- Progress Section -->
  <div class="progress-section" id="progress-section" style="display:none;">
    <div class="progress-header">
      <span class="progress-label">Tu progreso</span>
      <span class="progress-percent" id="progress-percent">0%</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-message" id="progress-message">Comienza tu diagnostico</div>
  </div>
  
  <div id="main-content"></div>
</div>

<!-- STICKY -->
<div class="sticky-bar" id="sticky-bar">
  <div class="sticky-inner">
    <div>
      <div class="sticky-lbl" id="sticky-lbl">Credizona Mi Plan</div>
      <div class="sticky-step" id="sticky-step">Diagnostico financiero gratuito</div>
    </div>
    <button class="sticky-btn" id="sticky-cta" onclick="next()">Continuar</button>
  </div>
</div>

<script src="js/badges.js"></script>
<script src="js/referrals.js"></script>
<script src="js/upsell.js"></script>
<script src="js/whatsapp-queue.js"></script>
<script src="js/app.js"></script>

</body>
</html>
